<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Cadastro</title>
    <link rel="stylesheet" href="../estiloscss/tela2.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+20&display=swap" rel="stylesheet">

</head>
</head>

<body>
    <div>
        <h1>Cadastro</h1>

        <form>
            <div>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>
            </div>

            <div>
                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone" required>
            </div>

            <div>
                <label for="endereco">Endereço:</label>
                <input type="text" id="endereco" name="endereco" required>
            </div>
            <div>
                <label for="CPF">CPF (Se for consumidor):</label>
                <input type="text" id="CPF" name="CPF">
            </div>
            <div>
                <label for="CNPJ">CNPJ(Se for estabelecimento):</label>
                <input type="text" id="CNPJ" name="CNPJ">
            </div>

            <div>
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div>
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required>
            </div>

            <div>
                <label for="confirmar-senha">Confirmar Senha:</label>
                <input type="password" id="confirmar-senha" name="confirmar-senha" required>
            </div>
            <div>
                <p>Perfil :</p>
                <select name="perfil" required>
                    <option value=""> selecione o tipo do seu perfil</option>
                    <option value="Consumidor">Consumidor</option>
                    <option value="Estabelecimento">Estabelecimento</option>
                </select>

            </div>



            <button type="submit" class="button1">Enviar</button>


        </form>
    </div>
</body>

</html>
